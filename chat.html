<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | THP Home Tutor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #00C9A7;
            --bubble-sent: linear-gradient(135deg, #6C5CE7, #8B7CF6);
            --bubble-received: #ffffff;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #64748b;
            --border: #e8ecf1;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-container {
            width: 100%;
            max-width: 750px;
            height: 95vh;
            max-height: 750px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Header */
        .chat-header {
            padding: 14px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .chat-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
            flex-shrink: 0;
        }
        .chat-header-info h3 {
            font-size: 1rem;
            font-weight: 700;
        }
        .chat-header-info p {
            font-size: 0.75rem;
            color: #10b981;
            font-weight: 600;
        }
        
        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: linear-gradient(180deg, #f8fafc 0%, #f0f2f5 100%);
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 10px; }
        
        .msg-wrapper {
            display: flex;
            gap: 6px;
            max-width: 80%;
            animation: msgIn 0.3s ease;
        }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.received { align-self: flex-start; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .sent .msg-bubble {
            background: var(--bubble-sent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .received .msg-bubble {
            background: var(--bubble-received);
            color: var(--text);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .msg-time {
            font-size: 0.6rem;
            margin-top: 3px;
            opacity: 0.7;
        }
        .sent .msg-time { text-align: right; color: rgba(255,255,255,0.8); }
        .received .msg-time { color: var(--text-secondary); }
        
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
        }
        .empty-chat i { font-size: 4rem; margin-bottom: 10px; color: #d0d5dd; }
        
        /* Input */
        .input-area {
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .msg-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
            transition: all 0.3s;
            background: #f8fafc;
        }
        .msg-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.08);
            background: white;
        }
        .send-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--bubble-sent);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* Login Prompt */
        .login-prompt {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }
        .login-prompt i { font-size: 4rem; color: #d0d5dd; margin-bottom: 14px; }
        .login-prompt h3 { font-weight: 700; margin-bottom: 6px; }
        .login-prompt p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 16px; }
        .btn-login {
            padding: 12px 28px;
            border-radius: 25px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @media (max-width: 500px) {
            .chat-container { height: 100vh; max-height: 100vh; border-radius: 0; }
            .msg-wrapper { max-width: 88%; }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        
        <!-- Header -->
        <div class="chat-header">
            <a href="browse-teachers.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="chat-avatar" id="chatAvatar">T</div>
            <div class="chat-header-info">
                <h3 id="chatName">Tutor</h3>
                <p id="chatStatus">● Online</p>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messagesArea">
            <div class="empty-chat" id="emptyState">
                <i class="fas fa-comments"></i>
                <h3>Start Conversation</h3>
                <p>Send a message to begin!</p>
            </div>
        </div>

        <!-- Login Prompt (hidden by default) -->
        <div class="login-prompt" id="loginPrompt" style="display:none;">
            <i class="fas fa-lock"></i>
            <h3>Login Required</h3>
            <p>Please login to chat with teachers</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
                <input type="email" id="loginEmail" placeholder="Email" style="padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-family:inherit;width:200px;">
                <input type="password" id="loginPassword" placeholder="Password" style="padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-family:inherit;width:200px;">
                <button class="btn-login" onclick="quickLogin()">Login & Chat</button>
            </div>
            <p style="font-size:0.75rem;color:#999;margin-top:8px;">Don't have account? <a href="teacher.html" style="color:var(--primary);">Register here</a></p>
        </div>

        <!-- Input -->
        <div class="input-area" id="inputArea">
            <input type="text" class="msg-input" id="messageInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // ============ FIREBASE ============
        firebase.initializeApp({
            apiKey: "AIzaSyABaZZOMR1-oudAzjGnsN6LvClW5VrkIQY",
            authDomain: "hometutor-a5c4d.firebaseapp.com",
            projectId: "hometutor-a5c4d",
            storageBucket: "hometutor-a5c4d.firebasestorage.app",
            messagingSenderId: "367381523059",
            appId: "1:367381523059:web:f4732dcbf1cf6f7993d806"
        });
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let currentUser = null;
        let chatPartnerId = null;
        let chatId = null;
        let unsubscribe = null;
        
        // ============ GET PARAMS ============
        const params = new URLSearchParams(window.location.search);
        chatPartnerId = params.get('teacher');
        const partnerName = params.get('name');
        
        if (partnerName) {
            document.getElementById('chatName').textContent = decodeURIComponent(partnerName);
            document.getElementById('chatAvatar').textContent = 
                decodeURIComponent(partnerName).split(' ').map(n=>n[0]).join('').toUpperCase().substring(0,2);
        }
        
        // ============ AUTH ============
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginPrompt').style.display = 'none';
                document.getElementById('inputArea').style.display = 'flex';
                
                if (chatPartnerId) {
                    chatId = [currentUser.uid, chatPartnerId].sort().join('_');
                    loadMessages();
                }
            } else {
                currentUser = null;
                document.getElementById('loginPrompt').style.display = 'flex';
                document.getElementById('inputArea').style.display = 'none';
                document.getElementById('messagesArea').innerHTML = '';
            }
        });
        
        // ============ QUICK LOGIN ============
        async function quickLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                toast('Enter email and password', 'error');
                return;
            }
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                toast('Logged in! Start chatting', 'success');
            } catch (e) {
                // Try to create account
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                    toast('Account created! Start chatting', 'success');
                } catch (e2) {
                    toast('Error: ' + e2.message, 'error');
                }
            }
        }
        
        // ============ LOAD MESSAGES ============
        function loadMessages() {
            if (!chatId) return;
            if (unsubscribe) unsubscribe();
            
            unsubscribe = db.collection('chats').doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    const area = document.getElementById('messagesArea');
                    const empty = document.getElementById('emptyState');
                    
                    if (snapshot.empty) {
                        if (empty) empty.style.display = 'flex';
                        return;
                    }
                    
                    if (empty) empty.style.display = 'none';
                    
                    let html = '';
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const isSent = msg.senderId === currentUser?.uid;
                        const time = msg.timestamp ? 
                            new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
                        
                        html += `
                            <div class="msg-wrapper ${isSent ? 'sent' : 'received'}">
                                <div class="msg-bubble">
                                    ${msg.message || ''}
                                    <div class="msg-time">${time}</div>
                                </div>
                            </div>`;
                    });
                    
                    area.innerHTML = html;
                    area.scrollTop = area.scrollHeight;
                });
        }
        
        // ============ SEND MESSAGE ============
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            if (!currentUser) { toast('Please login first', 'error'); return; }
            if (!chatPartnerId) { toast('No chat partner', 'error'); return; }
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            
            try {
                await db.collection('chats').doc(chatId).collection('messages').add({
                    senderId: currentUser.uid,
                    receiverId: chatPartnerId,
                    message: message,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Update chat metadata
                await db.collection('chats').doc(chatId).set({
                    participants: [currentUser.uid, chatPartnerId],
                    lastMessage: message,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
                input.value = '';
                btn.disabled = false;
                input.focus();
                
            } catch (error) {
                console.error('Send error:', error);
                toast('Failed to send', 'error');
                btn.disabled = false;
            }
        }
        
        function toast(msg, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        console.log('💬 Chat Ready!');
    </script>
</body>
</html>
