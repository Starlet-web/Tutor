<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | THP Home Tutor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #6C5CE7;
            --primary-light: #8B7CF6;
            --secondary: #00C9A7;
            --accent: #FF6B6B;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #64748b;
            --bubble-sent: linear-gradient(135deg, #6C5CE7, #8B7CF6);
            --bubble-received: #ffffff;
            --border: #e8ecf1;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 20px;
            --radius-sm: 14px;
            --transition: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Main Chat Container */
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            max-height: 800px;
            background: var(--surface);
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Chat Header */
        .chat-header {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover { background: #e2e8f0; }
        
        .chat-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }
        .chat-avatar-placeholder {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            flex-shrink: 0;
        }
        .chat-header-info {
            flex: 1;
            min-width: 0;
        }
        .chat-header-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .online-status {
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .online-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse-dot 2s infinite;
        }
        .offline-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #94a3b8;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }
        .header-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-secondary);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover { background: #e2e8f0; color: var(--primary); }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: linear-gradient(180deg, #f8fafc 0%, #f0f2f5 100%);
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 10px; }

        /* Date Separator */
        .date-separator {
            text-align: center;
            margin: 16px 0;
        }
        .date-separator span {
            background: #e2e8f0;
            color: var(--text-secondary);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            gap: 8px;
            max-width: 75%;
            animation: messageIn 0.3s ease;
        }
        .message-wrapper.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.received {
            align-self: flex-start;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .sent .message-bubble {
            background: var(--bubble-sent);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 12px rgba(108,92,231,0.2);
        }
        .received .message-bubble {
            background: var(--bubble-received);
            color: var(--text);
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .message-time {
            font-size: 0.65rem;
            margin-top: 4px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sent .message-time { justify-content: flex-end; color: rgba(255,255,255,0.8); }
        .received .message-time { color: var(--text-secondary); }

        .read-tick {
            color: #34d399;
            font-size: 0.6rem;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 12px 18px;
            background: white;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            align-self: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-top: 4px;
        }
        .typing-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #94a3b8;
            animation: typingBounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex-shrink: 0;
        }
        .attach-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: all 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .attach-btn:hover { background: #e2e8f0; color: var(--primary); }

        .message-input-wrapper {
            flex: 1;
            position: relative;
        }
        .message-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border: 2px solid var(--border);
            border-radius: 28px;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: all 0.3s;
            max-height: 120px;
            background: #f8fafc;
            line-height: 1.4;
        }
        .message-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108,92,231,0.08);
            background: white;
        }
        .emoji-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .emoji-btn:hover { color: var(--primary); transform: scale(1.1); }

        .send-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--bubble-sent);
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
        }
        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(108,92,231,0.4);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Emoji Picker */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 24px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            max-width: 320px;
            border: 1px solid var(--border);
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
        }
        .emoji-item {
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            border: none;
            background: none;
        }
        .emoji-item:hover {
            background: #f0edff;
            transform: scale(1.3);
        }

        /* Empty State */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }
        .empty-chat i {
            font-size: 5rem;
            margin-bottom: 16px;
            color: #d0d5dd;
        }
        .empty-chat h3 {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            font-size: 0.85rem;
            animation: slideIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }
            .message-wrapper {
                max-width: 85%;
            }
            .emoji-picker {
                right: 10px;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        
        <!-- ============ HEADER ============ -->
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()" title="Back">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div id="chatAvatarContainer">
                <div class="chat-avatar-placeholder">T</div>
            </div>
            
            <div class="chat-header-info">
                <h3 id="chatPartnerName">Tutor</h3>
                <span class="online-status" id="onlineStatus">
                    <span class="online-dot"></span> Online
                </span>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="callPartner()" title="Call">
                    <i class="fas fa-phone"></i>
                </button>
                <button class="header-btn" onclick="videoCall()" title="Video Call">
                    <i class="fas fa-video"></i>
                </button>
                <button class="header-btn" onclick="viewProfile()" title="View Profile">
                    <i class="fas fa-info-circle"></i>
                </button>
            </div>
        </div>

        <!-- ============ MESSAGES AREA ============ -->
        <div class="messages-area" id="messagesArea">
            <div class="empty-chat" id="emptyState">
                <i class="fas fa-comments"></i>
                <h3>Start a conversation</h3>
                <p>Send a message to begin chatting</p>
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- ============ INPUT AREA ============ -->
        <div class="input-area">
            <button class="attach-btn" onclick="handleAttach()" title="Attach">
                <i class="fas fa-paperclip"></i>
            </button>
            
            <div class="message-input-wrapper">
                <textarea class="message-input" id="messageInput" 
                          placeholder="Type a message..." rows="1"
                          onkeydown="handleKeyDown(event)"
                          oninput="autoResize(this)"></textarea>
                <button class="emoji-btn" onclick="toggleEmojiPicker()" title="Emoji">
                    😊
                </button>
            </div>
            
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <!-- ============ EMOJI PICKER ============ -->
        <div class="emoji-picker" id="emojiPicker">
            <div class="emoji-grid" id="emojiGrid"></div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // ============ FIREBASE ============
        firebase.initializeApp({
            apiKey: "AIzaSyABaZZOMR1-oudAzjGnsN6LvClW5VrkIQY",
            authDomain: "hometutor-a5c4d.firebaseapp.com",
            projectId: "hometutor-a5c4d",
            storageBucket: "hometutor-a5c4d.firebasestorage.app",
            messagingSenderId: "367381523059",
            appId: "1:367381523059:web:f4732dcbf1cf6f7993d806"
        });
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============ STATE ============
        let currentUser = null;
        let chatPartnerId = null;
        let chatPartnerData = null;
        let chatId = null;
        let unsubscribeMessages = null;
        let isTyping = false;
        let typingTimeout = null;

        // ============ EMOJIS ============
        const emojis = ['😀','😂','😍','🥰','😎','🤩','😇','😊','🙏','💪','👍','👎','❤️','🔥','⭐','🎉',
                        '📚','✏️','📖','🎓','🏫','📝','✅','❌','⏰','💰','📱','💻','🏠','🌟','💡','🎯'];

        // ============ INIT ============
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'teacher.html';
                return;
            }
            currentUser = user;
            
            // Get chat partner from URL
            const params = new URLSearchParams(window.location.search);
            chatPartnerId = params.get('teacher');
            const partnerName = params.get('name');
            
            if (!chatPartnerId) {
                document.getElementById('messagesArea').innerHTML = `
                    <div class="empty-chat">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>No chat partner specified</h3>
                        <p>Go back and select a teacher to chat with</p>
                    </div>`;
                return;
            }
            
            // Generate chat ID
            chatId = [currentUser.uid, chatPartnerId].sort().join('_');
            
            // Load partner data
            await loadPartnerData();
            
            // Set partner name
            if (partnerName) {
                document.getElementById('chatPartnerName').textContent = decodeURIComponent(partnerName);
            }
            
            // Load messages
            loadMessages();
            
            // Setup typing listener
            setupTypingListener();
            
            // Init emoji picker
            initEmojiPicker();
            
            console.log('💬 Chat ready:', chatId);
        });

        // ============ LOAD PARTNER DATA ============
        async function loadPartnerData() {
            try {
                const doc = await db.collection('teachers').doc(chatPartnerId).get();
                if (doc.exists) {
                    chatPartnerData = { id: doc.id, ...doc.data() };
                    
                    // Update UI
                    document.getElementById('chatPartnerName').textContent = 
                        chatPartnerData.fullName || 'Tutor';
                    
                    // Avatar
                    const initials = (chatPartnerData.fullName || 'T').split(' ')
                        .map(n => n[0]).join('').toUpperCase();
                    
                    if (chatPartnerData.profilePhoto) {
                        document.getElementById('chatAvatarContainer').innerHTML = `
                            <img src="${chatPartnerData.profilePhoto}" class="chat-avatar" 
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                            <div class="chat-avatar-placeholder" style="display:none">${initials}</div>`;
                    } else {
                        document.getElementById('chatAvatarContainer').innerHTML = `
                            <div class="chat-avatar-placeholder">${initials}</div>`;
                    }
                }
            } catch (error) {
                console.error('Load partner error:', error);
            }
        }

        // ============ LOAD MESSAGES ============
        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            
            unsubscribeMessages = db.collection('chats').doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messagesArea = document.getElementById('messagesArea');
                    const emptyState = document.getElementById('emptyState');
                    
                    if (snapshot.empty) {
                        if (emptyState) emptyState.style.display = 'flex';
                        return;
                    }
                    
                    if (emptyState) emptyState.style.display = 'none';
                    
                    let html = '';
                    let lastDate = '';
                    
                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        const msgDate = msg.timestamp ? 
                            new Date(msg.timestamp.toDate()).toLocaleDateString('en-US', {
                                weekday: 'short', month: 'short', day: 'numeric'
                            }) : '';
                        
                        // Date separator
                        if (msgDate !== lastDate && msgDate) {
                            html += `<div class="date-separator"><span>${msgDate}</span></div>`;
                            lastDate = msgDate;
                        }
                        
                        const isSent = msg.senderId === currentUser.uid;
                        const time = msg.timestamp ? 
                            new Date(msg.timestamp.toDate()).toLocaleTimeString('en-US', {
                                hour: '2-digit', minute: '2-digit', hour12: true
                            }) : '';
                        
                        html += `
                            <div class="message-wrapper ${isSent ? 'sent' : 'received'}">
                                <div class="message-bubble">
                                    ${msg.message || ''}
                                    ${msg.imageUrl ? `<br><img src="${msg.imageUrl}" style="max-width:200px;border-radius:12px;margin-top:8px;" onclick="window.open('${msg.imageUrl}')">` : ''}
                                    <div class="message-time">
                                        ${time}
                                        ${isSent ? `<span class="read-tick">${msg.read ? '✓✓' : '✓'}</span>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    });
                    
                    // Add typing indicator container
                    html += '<div class="typing-indicator" id="typingIndicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
                    
                    messagesArea.innerHTML = html;
                    scrollToBottom();
                });
        }

        // ============ SEND MESSAGE ============
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !chatId || !currentUser) return;
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                await db.collection('chats').doc(chatId).collection('messages').add({
                    senderId: currentUser.uid,
                    receiverId: chatPartnerId,
                    message: message,
                    messageType: 'text',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                });
                
                // Update last message in chat doc
                await db.collection('chats').doc(chatId).set({
                    participants: [currentUser.uid, chatPartnerId],
                    lastMessage: message,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    lastSenderId: currentUser.uid
                }, { merge: true });
                
                input.value = '';
                input.style.height = 'auto';
                sendBtn.disabled = false;
                
            } catch (error) {
                console.error('Send error:', error);
                toast('Failed to send message', 'error');
                sendBtn.disabled = false;
            }
        }

        // ============ TYPING INDICATOR ============
        function setupTypingListener() {
            const typingRef = db.collection('chats').doc(chatId);
            
            // Listen for partner typing
            db.collection('chats').doc(chatId)
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const typingUsers = data.typing || {};
                        const isPartnerTyping = Object.keys(typingUsers)
                            .some(uid => uid !== currentUser.uid && typingUsers[uid]);
                        
                        const indicator = document.getElementById('typingIndicator');
                        if (indicator) {
                            indicator.style.display = isPartnerTyping ? 'flex' : 'none';
                        }
                        if (isPartnerTyping) scrollToBottom();
                    }
                });
        }

        function handleTyping() {
            if (!isTyping) {
                isTyping = true;
                db.collection('chats').doc(chatId).set({
                    typing: { [currentUser.uid]: true }
                }, { merge: true });
            }
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isTyping = false;
                db.collection('chats').doc(chatId).set({
                    typing: { [currentUser.uid]: false }
                }, { merge: true });
            }, 2000);
        }

        // ============ EMOJI PICKER ============
        function initEmojiPicker() {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = emojis.map(e => 
                `<button class="emoji-item" onclick="insertEmoji('${e}')">${e}</button>`
            ).join('');
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
            document.getElementById('emojiPicker').style.display = 'none';
        }

        // ============ FILE UPLOAD ============
        function handleAttach() {
            document.getElementById('fileInput').click();
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                toast('Only images are supported', 'error');
                return;
            }
            
            toast('Uploading image...', 'success');
            
            // Upload to imgBB
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=53fb01955a45c5462724b8f7d238500a', {
                    method: 'POST', body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    // Send image message
                    await db.collection('chats').doc(chatId).collection('messages').add({
                        senderId: currentUser.uid,
                        receiverId: chatPartnerId,
                        message: '📷 Image',
                        imageUrl: data.data.url,
                        messageType: 'image',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        read: false
                    });
                    toast('Image sent!', 'success');
                }
            } catch (error) {
                toast('Upload failed', 'error');
            }
            
            document.getElementById('fileInput').value = '';
        }

        // ============ KEY HANDLER ============
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
            handleTyping();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // ============ ACTIONS ============
        function callPartner() {
            if (chatPartnerData?.phone) {
                window.open(`tel:${chatPartnerData.phone}`);
            } else {
                toast('Phone number not available', 'error');
            }
        }

        function videoCall() {
            toast('Video call coming soon!', 'success');
        }

        function viewProfile() {
            if (chatPartnerData) {
                alert(`👤 ${chatPartnerData.fullName}\n\n📚 ${chatPartnerData.qualification}\n📍 ${chatPartnerData.area}, ${chatPartnerData.city}\n💰 ₹${chatPartnerData.expectedFees}/hr\n📞 ${chatPartnerData.phone}`);
            }
        }

        function goBack() {
            window.history.back();
        }

        // ============ UTILS ============
        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            setTimeout(() => {
                area.scrollTop = area.scrollHeight;
            }, 100);
        }

        function toast(msg, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.animation = 'slideIn 0.4s ease reverse'; setTimeout(() => t.remove(), 400); }, 3000);
        }

        // ============ CLOSE EMOJI PICKER ON CLICK OUTSIDE ============
        document.addEventListener('click', (e) => {
            const picker = document.getElementById('emojiPicker');
            const emojiBtn = document.querySelector('.emoji-btn');
            if (picker && !picker.contains(e.target) && e.target !== emojiBtn && !emojiBtn?.contains(e.target)) {
                picker.style.display = 'none';
            }
        });

        console.log('💬 Premium Chat System Ready!');
        console.log('✨ Features: Real-time, Typing, Emoji, Images, Read Receipts');
    </script>

</body>
</html>
